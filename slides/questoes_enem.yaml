  question_elements:
    - question_text_title: TEXTO I
      question_text: >
        Aristóteles entendia que a felicidade era diretamente ligada ao respeito pela própria natureza
        e, de certa maneira, a uma vida que tivesse na natureza de si mesma uma referência inabalável.
        Isso lhe permitiu formular o conceito de excelência. O que seria excelência? Seria, justamente,
        ao longo da vida, tirar de si mesmo, em forma de performance, de conduta, de comportamento,
        de disposição, o que a natureza permitiria de melhor.
      question_text_reference: >
        COEN, M.; BARROS FILHO, C. **A monja e o professor**: reflexões sobre ética, preceitos e valores. Rio de Janeiro: Best Seller, 2018.
    - question_text_title: TEXTO II
      question_text: >
        A noção de eudaimonia é central para a ética aristotélica. A eudaimonia é uma atividade e não
        um estado psicológico, pois é definida na Ética a Nicômaco como uma atividade da alma com base
        na virtude moral. A virtude moral é definida em termos de uma disposição diretamente ligada à
        deliberação, o que o leva a estudar a virtude intelectual que opera em seu interior, isto é, a prudência.
        A estrutura conceitual da ética aristotélica responde a uma tentativa de elucidar conceitualmente
        em que consiste isto, agir bem, ou, na linguagem aristotélica, o que significa ser feliz.
      question_text_reference: >
        ZINGANO, M. Eudaimonia, razão e contemplação na ética aristotélica. **Analytica**, n. 1, 2017 (adaptado).
  statement: >
    Os textos indicam que a prática de ações virtuosas, sempre efetivada na pólis, ocorre por meio do(a)
  answers:
    A: "teoria das formas essenciais."
    B: "identificação dos princípios racionais."
    C: "desenvolvimento das técnicas retóricas."
    D: "aperfeiçoamento das condutas humanas."
    E: "conhecimento das epistemes verdadeiras."
  correct_answer: D

